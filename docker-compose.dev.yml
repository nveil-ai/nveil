# ============================================================================
#  NVEIL — Developer edition (build from source)
# ============================================================================
#
#  Standalone dev stack: builds every image from the local source and mounts
#  ./nveil/backend for live reload. Use this when working ON Nveil — end users
#  use docker-compose.yaml (prebuilt images from ghcr.io, no source).
#
#  Quick start:
#    docker compose -f docker-compose.dev.yml up setup            (configure → .env)
#    docker compose -f docker-compose.dev.yml --profile core up --build -d
#    Open https://localhost:8000
#
#  Adds over the shipped stack: TEST mode (/docs + debug routes), an auth test
#  allowlist, and an optional bundled Langfuse LLM-tracing stack (--profile
#  tracing, UI http://localhost:3030 — dev@nveil.com / dev-password). To use an
#  existing Langfuse instead, set LANGFUSE_HOST/PUBLIC_KEY/SECRET_KEY in .env
#  and skip --profile tracing.
#
# ============================================================================


name: nveil


# ── Shared anchor: LLM provider env (BYOK) ──────────────────────────────────
# Referenced by `ai` (LLM processing) and `server` (which forwards the set to
# the viz containers it spawns — choregraph LLM nodes pick the provider at
# runtime). TODO(team): drop the viz forward once LLM is removed from viz.
x-llm-env: &llm-env
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-}
  LLAMACPP_BASE_URL: ${LLAMACPP_BASE_URL:-}
  LLAMACPP_MODEL: ${LLAMACPP_MODEL:-}
  OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
  OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
  OPENAI_COMPAT_MODEL: ${OPENAI_COMPAT_MODEL:-}


# ============================================================================
#  Services
# ============================================================================
services:
  # ── TLS certificate init ──────────────────────────────────────────────────
  # One-shot: generates a unique self-signed cert into the shared volume on
  # first start. Inline (public alpine/openssl image), unique per install.
  init-certs:
    image: alpine/openssl
    profiles: ["core"]
    entrypoint: ["sh", "-c"]
    command:
    - |
      if [ -f /certs/ma_cle_privee.key ] && [ -f /certs/mon_certificat.crt ]; then
        echo "[init-certs] Certificates already exist — skipping."
        exit 0
      fi
      echo "[init-certs] Generating self-signed TLS certificate..."
      openssl req -x509 -newkey rsa:2048 -nodes \
        -keyout /certs/ma_cle_privee.key \
        -out /certs/mon_certificat.crt \
        -days 3650 -subj "/CN=localhost" \
        -addext "subjectAltName=DNS:localhost,DNS:server,DNS:ai,DNS:file,DNS:viz,DNS:*.viz-service.svc.cluster.local,IP:127.0.0.1" \
        2>/dev/null
      chmod 644 /certs/mon_certificat.crt
      chmod 600 /certs/ma_cle_privee.key
      echo "[init-certs] Done."
    volumes:
    - nveil-certs:/certs


  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # ai_user role + `state` database created on first init by the SQL injected
  # via the `init-ai-db` config below (no host file, no extra container).
  postgres:
    image: postgres:17-alpine
    profiles: ["core"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nveil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-nveil}
    volumes:
    - postgres-data:/var/lib/postgresql/data
    configs:
    - source: init-ai-db
      target: /docker-entrypoint-initdb.d/init-ai-db.sql
    ports:
    - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nveil -d nveil"]
      interval: 5s
      timeout: 3s
      retries: 10


  # ── Server (API + frontend) ───────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: docker/server/dockerfile
    profiles: ["core"]
    environment:
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-nveilseption}
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-nveil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nveil}"
      SECRET_KEY: ${SECRET_KEY:-}
      ALGORITHM: ${ALGORITHM:-HS512}

      # Full BYOK LLM set, forwarded to the viz containers the server spawns
      # (choregraph LLM nodes pick the provider at runtime). See x-llm-env.
      <<: *llm-env

      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}

      # Project-scoped Docker resource names the server needs to spawn viz
      # containers (derived from the compose project name; kept here).
      DOCKER_NETWORK: "${COMPOSE_PROJECT_NAME:-nveil}_default"
      CERT_VOLUME: "${COMPOSE_PROJECT_NAME:-nveil}_nveil-certs"
      DIVE_VOLUME: "${COMPOSE_PROJECT_NAME:-nveil}_${DATA_PATH:-nveil-data}"

      # ── Dev only ──────────────────────────────────────────────────────
      TEST: "1"                          # exposes /docs + debug routes
      AUTH_TEST_EMAILS: ${AUTH_TEST_EMAILS:-}
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./nveil/backend:/nveil/backend
    - "${DATA_PATH:-nveil-data}:/root/DIVE"
    - nveil-certs:/certs:ro
    ports:
    - "8000:8000"
    depends_on:
      init-certs:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy


  # ── AI Service ─────────────────────────────────────────────────────────────
  ai:
    build:
      context: .
      dockerfile: docker/ai/dockerfile
    profiles: ["core"]
    # Reach the bundled Langfuse on Linux too (Docker Desktop provides it
    # natively). Used only to reach Langfuse; harmless when tracing is off.
    extra_hosts:
    - "host.docker.internal:host-gateway"
    environment:
      <<: *llm-env
      STATE_DATABASE_URL: "postgresql+asyncpg://ai_user:${AI_DB_PASSWORD}@postgres:5432/state"

      # ── Dev only: LLM tracing (inert unless LANGFUSE_TRACING=1) ────────
      LANGFUSE_TRACING: "${LANGFUSE_TRACING:-}"
      LANGFUSE_HOST: "${LANGFUSE_HOST:-http://host.docker.internal:3030}"
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-pk-lf-community-dev}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-sk-lf-community-dev}"
      LANGFUSE_PROMPT_LABEL: "${LANGFUSE_PROMPT_LABEL:-latest}"
    volumes:
    - ./nveil/backend:/nveil/backend
    - "${DATA_PATH:-nveil-data}:/root/DIVE"
    - nveil-certs:/certs:ro
    ports:
    - "8100:8100"
    depends_on:
      init-certs:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy


  # ── File Service ───────────────────────────────────────────────────────────
  file:
    build:
      context: .
      dockerfile: docker/file/dockerfile
    profiles: ["core"]
    environment:
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-nveilseption}
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-nveil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nveil}"
    volumes:
    - ./nveil/backend:/nveil/backend
    - "${DATA_PATH:-nveil-data}:/root/DIVE"
    - nveil-certs:/certs:ro
    ports:
    - "8200:8200"
    depends_on:
      init-certs:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy


  # ── Visualization ──────────────────────────────────────────────────────────
  viz:
    build:
      context: .
      dockerfile: docker/visualization/dockerfile
    image: nveil_visualization:latest
    profiles: ["core"]
    deploy:
      replicas: 0


  # ── Setup Wizard ────────────────────────────────────────────────────────────
  # Run separately:  docker compose -f docker-compose.dev.yml up setup
  setup:
    build:
      context: .
      dockerfile: docker/setup/Dockerfile
    ports:
    - "3000:3000"
    volumes:
    - .:/workspace


  # ── Langfuse (optional: LLM tracing + prompt management) ────────────────────
  # All six services live under the "tracing" profile (off unless --profile
  # tracing). The `ai` service reaches langfuse-web via the published port
  # (host.docker.internal:3030). UI: http://localhost:3030 — dev@nveil.com /
  # dev-password. See nveil/backend/docs/ai/tracing.md for the full guide.
  langfuse-postgres:
    image: postgres:17-alpine
    profiles: ["tracing"]
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
      POSTGRES_DB: langfuse
    volumes:
    - langfuse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server
    profiles: ["tracing"]
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
    - langfuse-clickhouse-data:/var/lib/clickhouse
    - langfuse-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping ||
        exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-redis:
    image: redis:7-alpine
    profiles: ["tracing"]
    command: --requirepass ${LANGFUSE_REDIS_PASSWORD:-myredissecret}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  langfuse-minio:
    image: minio/minio
    profiles: ["tracing"]
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000"
      --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_MINIO_USER:-minio}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_PASSWORD:-miniosecret}
    volumes:
    - langfuse-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    profiles: ["tracing"]
    restart: always
    depends_on:
      langfuse-postgres: {condition: service_healthy}
      langfuse-clickhouse: {condition: service_healthy}
      langfuse-redis: {condition: service_healthy}
      langfuse-minio: {condition: service_healthy}
    environment:
      DATABASE_URL: "postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-postgres:5432/langfuse"
      SALT: ${LANGFUSE_SALT:-mysalt}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-a1b2c3d4e5f60718293a4b5c6d7e8f9012345678901234567890abcdef123456}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: "redis://default:${LANGFUSE_REDIS_PASSWORD:-myredissecret}@langfuse-redis:6379/0"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_LOG_LEVEL: "${LANGFUSE_WEB_LOG_LEVEL:-warn}"

  langfuse-web:
    image: langfuse/langfuse:3
    profiles: ["tracing"]
    restart: always
    depends_on:
      langfuse-postgres: {condition: service_healthy}
      langfuse-clickhouse: {condition: service_healthy}
      langfuse-redis: {condition: service_healthy}
      langfuse-minio: {condition: service_healthy}
    ports:
    - "3030:3000"
    environment:
      DATABASE_URL: "postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-postgres:5432/langfuse"
      SALT: ${LANGFUSE_SALT:-mysalt}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-a1b2c3d4e5f60718293a4b5c6d7e8f9012345678901234567890abcdef123456}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: "redis://default:${LANGFUSE_REDIS_PASSWORD:-myredissecret}@langfuse-redis:6379/0"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      NEXTAUTH_URL: http://localhost:3030
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-mysecret}
      LANGFUSE_INIT_ORG_ID: nveil
      LANGFUSE_INIT_ORG_NAME: Nveil
      LANGFUSE_INIT_PROJECT_ID: ai
      LANGFUSE_INIT_PROJECT_NAME: ai-service
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-pk-lf-community-dev}"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-sk-lf-community-dev}"
      LANGFUSE_INIT_USER_EMAIL: dev@nveil.com
      LANGFUSE_INIT_USER_NAME: nveil
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-dev-password}
      LANGFUSE_LOG_LEVEL: "${LANGFUSE_WEB_LOG_LEVEL:-warn}"


# ============================================================================
#  Volumes
# ============================================================================
volumes:
  postgres-data:
  nveil-certs:
  nveil-data:
  langfuse-postgres-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-minio-data:


# ============================================================================
#  Configs — inline content injected into containers (no host files)
# ============================================================================
configs:
  # Runs once on first postgres init: creates the ai_user role and the `state`
  # database used by the AI service.
  init-ai-db:
    content: |
      CREATE USER ai_user WITH PASSWORD '${AI_DB_PASSWORD}';
      CREATE DATABASE state OWNER ai_user;
      GRANT ALL PRIVILEGES ON DATABASE state TO ai_user;
