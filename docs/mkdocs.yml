#
# NVEIL Platform documentation — built standalone (its own theme) and served at
# docs.nveil.com/nveil/ by the nveil-docs portal. Combines the self-host guide
# (pages/) with the backend and frontend developer docs via the monorepo plugin.
# Kept under docs/ to keep the repository root clean; build with:
#   mkdocs build -f docs/mkdocs.yml

site_name: NVEIL Self-Host
site_url: https://docs.nveil.com/nveil/
site_description: Self-host and build on the NVEIL data exploration & visualization platform.
docs_dir: pages

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle: { icon: material/brightness-7, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle: { icon: material/brightness-4, name: Switch to light mode }
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.prune
    - content.code.copy
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/nveil-ai/nveil

plugins:
  - search
  - monorepo

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - "← NVEIL Docs": https://docs.nveil.com/
  - Overview: index.md
  - Self-hosting: self-hosting.md
  - Backend: '!include ../nveil/backend/mkdocs.yml'
  - Frontend: '!include ../nveil/frontend/docs/mkdocs.yml'
