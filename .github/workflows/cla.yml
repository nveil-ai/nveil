name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # Signatures are stored in THIS repo (the cla-signatures branch), so the
          # built-in GITHUB_TOKEN is enough — no PAT/secret to create. A
          # PERSONAL_ACCESS_TOKEN would only be needed to store them in a remote repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/nveil-ai/nveil/blob/main/licensing/CLA.md'
          branch: 'cla-signatures'
          allowlist: pierrejacquet,dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: >-
            Thank you for your contribution! Before we can merge it, please read the
            [NVEIL Contributor License Agreement](https://github.com/nveil-ai/nveil/blob/main/licensing/CLA.md)
            and sign it by posting the comment below.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
