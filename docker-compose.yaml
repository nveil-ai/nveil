# ============================================================================
#  NVEIL Community Edition — prebuilt images (pull mode)
# ============================================================================
#
#  This is the ONLY file a user needs. Nothing is built locally and no source
#  is mounted: every service runs from a prebuilt image on ghcr.io/nveil-ai.
#
#  Quick start:
#    docker compose up setup     (configure → writes .env)
#    docker compose pull         (fetch images)
#    docker compose up -d
#    Open https://localhost:8000
#
#  Pin a different release with NVEIL_VERSION in .env (default below).
#
#  Working ON Nveil? Use docker-compose.dev.yml instead (builds from source,
#  live reload, TEST mode, optional Langfuse).
#
# ============================================================================


name: nveil


# ── Shared anchor: LLM provider env (BYOK) ──────────────────────────────────
# Referenced by `ai` (LLM processing) and `server` (which forwards the set to
# the viz containers it spawns — choregraph LLM nodes pick the provider at
# runtime). TODO(team): drop the viz forward once LLM is removed from viz.
x-llm-env: &llm-env
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-}
  LLAMACPP_BASE_URL: ${LLAMACPP_BASE_URL:-}
  LLAMACPP_MODEL: ${LLAMACPP_MODEL:-}
  OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
  OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
  OPENAI_COMPAT_MODEL: ${OPENAI_COMPAT_MODEL:-}


# ============================================================================
#  Services
# ============================================================================
services:
  # ── TLS certificate init ──────────────────────────────────────────────────
  # One-shot: generates a unique self-signed cert into the shared volume on
  # first start. Inline (public alpine/openssl image) so the cert is never
  # baked into a published image — each install gets its own private key.
  init-certs:
    image: alpine/openssl
    profiles: ["core"]
    entrypoint: ["sh", "-c"]
    command:
    - |
      if [ -f /certs/ma_cle_privee.key ] && [ -f /certs/mon_certificat.crt ]; then
        echo "[init-certs] Certificates already exist — skipping."
        exit 0
      fi
      echo "[init-certs] Generating self-signed TLS certificate..."
      openssl req -x509 -newkey rsa:2048 -nodes \
        -keyout /certs/ma_cle_privee.key \
        -out /certs/mon_certificat.crt \
        -days 3650 -subj "/CN=localhost" \
        -addext "subjectAltName=DNS:localhost,DNS:server,DNS:ai,DNS:file,DNS:viz,DNS:*.viz-service.svc.cluster.local,IP:127.0.0.1" \
        2>/dev/null
      chmod 644 /certs/mon_certificat.crt
      chmod 600 /certs/ma_cle_privee.key
      echo "[init-certs] Done."
    volumes:
    - nveil-certs:/certs


  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # The ai_user role + `state` database are created on first init by the SQL
  # injected via the `init-ai-db` config below (no host file, no extra
  # container) — the official image only bootstraps a single user/db from env.
  postgres:
    image: postgres:17-alpine
    profiles: ["core"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nveil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-nveil}
    volumes:
    - postgres-data:/var/lib/postgresql/data
    configs:
    - source: init-ai-db
      target: /docker-entrypoint-initdb.d/init-ai-db.sql
    ports:
    - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nveil -d nveil"]
      interval: 5s
      timeout: 3s
      retries: 10


  # ── Server (API + frontend) ───────────────────────────────────────────────
  server:
    image: ghcr.io/nveil-ai/nveil-server:${NVEIL_VERSION:-0.4.7}
    profiles: ["core"]
    environment:
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-nveilseption}
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-nveil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nveil}"
      SECRET_KEY: ${SECRET_KEY:-}
      ALGORITHM: ${ALGORITHM:-HS512}

      # Full BYOK LLM set, forwarded to the viz containers the server spawns
      # (choregraph LLM nodes pick the provider at runtime). See x-llm-env.
      <<: *llm-env

      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}

      # Project-scoped Docker resource names the server needs to spawn viz
      # containers (derived from the compose project name; kept here).
      DOCKER_NETWORK: "${COMPOSE_PROJECT_NAME:-nveil}_default"
      CERT_VOLUME: "${COMPOSE_PROJECT_NAME:-nveil}_nveil-certs"
      DIVE_VOLUME: "${COMPOSE_PROJECT_NAME:-nveil}_${DATA_PATH:-nveil-data}"
      # Image the pool manager spawns for viz (the pulled one, not the dev tag).
      VIZ_IMAGE: ghcr.io/nveil-ai/nveil-viz:${NVEIL_VERSION:-0.4.7}
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - "${DATA_PATH:-nveil-data}:/root/DIVE"
    - nveil-certs:/certs:ro
    ports:
    - "8000:8000"
    depends_on:
      init-certs:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy


  # ── AI Service ─────────────────────────────────────────────────────────────
  ai:
    image: ghcr.io/nveil-ai/nveil-ai:${NVEIL_VERSION:-0.4.7}
    profiles: ["core"]
    environment:
      <<: *llm-env
      STATE_DATABASE_URL: "postgresql+asyncpg://ai_user:${AI_DB_PASSWORD}@postgres:5432/state"
    volumes:
    - "${DATA_PATH:-nveil-data}:/root/DIVE"
    - nveil-certs:/certs:ro
    ports:
    - "8100:8100"
    depends_on:
      init-certs:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy


  # ── File Service ───────────────────────────────────────────────────────────
  file:
    image: ghcr.io/nveil-ai/nveil-file:${NVEIL_VERSION:-0.4.7}
    profiles: ["core"]
    environment:
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-nveilseption}
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-nveil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nveil}"
    volumes:
    - "${DATA_PATH:-nveil-data}:/root/DIVE"
    - nveil-certs:/certs:ro
    ports:
    - "8200:8200"
    depends_on:
      init-certs:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy


  # ── Visualization ──────────────────────────────────────────────────────────
  # Not a long-running service (replicas 0) — the server spawns viz containers
  # on demand from VIZ_IMAGE. Declared so `docker compose pull` fetches it.
  viz:
    image: ghcr.io/nveil-ai/nveil-viz:${NVEIL_VERSION:-0.4.7}
    profiles: ["core"]
    deploy:
      replicas: 0


  # ── Setup Wizard ────────────────────────────────────────────────────────────
  # Run separately:  docker compose up setup
  # Baked code in the image; the mount is only so the wizard reads/writes the
  # .env in the user's current directory.
  setup:
    image: ghcr.io/nveil-ai/nveil-setup:${NVEIL_VERSION:-0.4.7}
    ports:
    - "3000:3000"
    volumes:
    - .:/workspace


# ============================================================================
#  Volumes
# ============================================================================
volumes:
  postgres-data:
  nveil-certs:
  nveil-data:


# ============================================================================
#  Configs — inline content injected into containers (no host files)
# ============================================================================
configs:
  # Runs once on first postgres init: creates the ai_user role and the `state`
  # database used by the AI service.
  init-ai-db:
    content: |
      CREATE USER ai_user WITH PASSWORD '${AI_DB_PASSWORD}';
      CREATE DATABASE state OWNER ai_user;
      GRANT ALL PRIVILEGES ON DATABASE state TO ai_user;
