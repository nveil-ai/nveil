site_name: NVEIL Frontend
site_description: "NVEIL Frontend — React application"
site_url: ""

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - section-index

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
    - architecture/index.md
    - Routing: architecture/routing.md
    - State Management: architecture/state.md
    - API Layer: architecture/api.md
    - Internationalization: architecture/i18n.md
  - Pages:
    - pages/index.md
    - Home & Chat: pages/home.md
    - Visualization: pages/viz.md
    - Dashboard: pages/dashboard.md
    - Data Manager: pages/data.md
    - Authentication: pages/auth.md
  - Components:
    - components/index.md
  - Developer Guide:
    - developer/index.md
    - Separation of Concerns: developer/separation.md
    - Styling Guide: developer/styling.md
    - Adding Pages: developer/adding-pages.md
    - Testing: developer/testing.md

copyright: "Copyright &copy; 2025 NVEIL — MIT License"
