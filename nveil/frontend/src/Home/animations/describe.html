<div class="stage">

  <div class="glow"></div>

  <!-- Top heading -->
  <div class="top-heading">
    <h1>Describe <span>what you need</span></h1>
    <p>Nveil picks the best visualization for your data</p>
  </div>

  <!-- Chart preview area -->
  <div class="chart-area" id="ds-chartArea"></div>

  <!-- Input area -->
  <div class="input-area">
    <div class="lang-badge" id="ds-langBadge" style="display:none;">EN</div>
    <div class="input-bar" id="ds-inputBar">
      <div class="input-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <div class="input-text" id="ds-inputText"><span class="cursor-blink"></span></div>
      <div class="send-btn" id="ds-sendBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Dots -->
  <div class="dots" id="ds-dots"></div>

</div>
