<div class="stage" id="up-stage">

  <!-- Glow -->
  <div class="glow"></div>

  <!-- Persistent top heading -->
  <div class="top-heading">
    <h1>Upload your <span>data</span></h1>
    <p>CSV · XLSX · XML · JSON · DICOM · MHD · and more</p>
  </div>

  <!-- Replay -->
  <button class="replay-btn" id="up-replayBtn" >↺ Replay</button>

  <!-- File cards -->
  <div class="file-area" id="up-fileArea"></div>

  <!-- Input bar -->
  <div class="input-bar-wrap">
    <div class="input-bar" id="up-inputBar">
      <div class="input-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <span class="input-placeholder">Drop any file or describe your data…</span>
      <div class="send-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Dots -->
  <div class="dots" id="up-dots"></div>

</div>
