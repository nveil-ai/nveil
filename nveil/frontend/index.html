<html lang="en" id="html-tag">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- DNS prefetch for external resources -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <!-- Preconnect to external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Import map: heavy viz libs are served from our own /vendor/ directory
       (pre-bundled by scripts/fetch-vendor-cdn.mjs at build time from
       locally-installed node_modules). Only libs without a React peer dep
       are externalized — React + react-plotly stay in Vite's normal bundle
       so they share one React.
       __V_X__ placeholders resolved at build time by vendor-version-injector. -->
  <script type="importmap">
  {
    "imports": {
      "plotly.js-dist-min": "/vendor/plotly-__V_PLOTLY__.mjs"
    }
  }
  </script>

  <title>NVEIL</title>
  <!-- Full SEO meta tags (description, OG, Twitter) are managed by react-helmet-async via SEO.jsx -->
  <!-- Helmet replaces the <title> above once React hydrates -->

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/icons/nveil-192.png" />
  <link rel="apple-touch-icon" href="/icons/nveil-192.png" />
  
  <!-- Preload LCP font (hero text is the LCP element; font swap causes CLS) -->
  <link rel="preload" href="/Fonts/InterTight-VariableFont_wght.woff2" as="font" type="font/woff2" crossorigin />

  <!-- Defer non-critical font CSS -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  </noscript>

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
</head>

<body>
  <div id="root" style="display: flex; width: 100vw; height: 100vh; overflow: hidden;"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
