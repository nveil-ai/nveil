# OpenAI — reasoning_effort is supported on o-series and GPT-5 family.
# Adjust models to match your account access.

defaults:
  model: ~google/gemini-flash-latest
  temperature: 0.3
  # reasoning_effort: low

# Smallest/cheapest viable model for this provider — single source of truth,
# shared by choregraph CSV characterization and the setup "test connection"
# ping. Nodes opt in via `inherits: minimal`.
minimal:
  model: gpt-4o-mini

nodes:
  entry_classification:
    temperature: 0

  exclusion_processing:
    temperature: 0.2

  xml_generation:
    temperature: 0.1

  keyword_classification:
    temperature: 0.2
    # reasoning_effort: minimal

  planning_transformation:
    temperature: 0.1
    # reasoning_effort: low

  feedback:
    temperature: 0.7
    # reasoning_effort: low
